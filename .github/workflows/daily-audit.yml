name: Daily Site Audit

on:
  schedule:
    - cron: '30 9 * * *'
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  issues: write

concurrency:
  group: daily-site-audit
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Run autonomous audit
        id: run_audit
        continue-on-error: true
        env:
          AUDIT_APP_URL: ${{ secrets.AUDIT_APP_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run audit:daily

      - name: Build fallback report when script crashes
        if: ${{ !hashFiles('audit-results/latest-audit.json') }}
        run: |
          mkdir -p audit-results
          cat > audit-results/latest-audit.json <<'JSON'
          {
            "status": "failed",
            "summary": { "critical": 1, "warning": 0, "total": 1 },
            "issues": [
              {
                "severity": "critical",
                "code": "AUDIT_OUTPUT_MISSING",
                "message": "Script terminou sem gerar relatório",
                "context": {}
              }
            ]
          }
          JSON
          cat > audit-results/latest-audit.md <<'MD'
          # Auditoria Diária - MedEscala

          - Status: **FAILED**
          - Erros críticos: **1**

          1. [CRITICAL] AUDIT_OUTPUT_MISSING - Script terminou sem gerar relatório
          MD

      - name: Parse audit summary
        id: parse
        run: |
          node <<'NODE'
          const fs = require('fs');

          const audit = JSON.parse(fs.readFileSync('audit-results/latest-audit.json', 'utf8'));
          const outputPath = process.env.GITHUB_OUTPUT;

          fs.appendFileSync(outputPath, `status=${audit.status || 'failed'}\n`);
          fs.appendFileSync(outputPath, `critical=${audit.summary?.critical ?? 1}\n`);
          fs.appendFileSync(outputPath, `warning=${audit.summary?.warning ?? 0}\n`);
          NODE

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-audit-report
          path: audit-results/

      - name: Add run summary
        if: always()
        run: |
          echo "## Daily Audit" >> "$GITHUB_STEP_SUMMARY"
          cat audit-results/latest-audit.md >> "$GITHUB_STEP_SUMMARY"

      - name: Create or update incident issue
        if: always()
        uses: actions/github-script@v7
        env:
          CRITICAL_COUNT: ${{ steps.parse.outputs.critical }}
        with:
          script: |
            const fs = require('fs');
            const title = '[Audit Diário] Falhas críticas detectadas';
            const body = fs.readFileSync('audit-results/latest-audit.md', 'utf8');
            const critical = Number(process.env.CRITICAL_COUNT || '0');
            const { owner, repo } = context.repo;

            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });

            const existing = openIssues.find((i) => i.title === title);

            if (critical > 0) {
              if (existing) {
                await github.rest.issues.update({ owner, repo, issue_number: existing.number, body });
              } else {
                await github.rest.issues.create({ owner, repo, title, body });
              }
            } else if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body: 'Auditoria diária sem falhas críticas. Issue fechada automaticamente.',
              });
              await github.rest.issues.update({ owner, repo, issue_number: existing.number, state: 'closed' });
            }

      - name: Optional webhook notification
        if: always() && env.AUDIT_WEBHOOK_URL != ''
        env:
          AUDIT_WEBHOOK_URL: ${{ secrets.AUDIT_WEBHOOK_URL }}
        run: |
          payload=$(cat audit-results/latest-audit.json)
          curl -sS -X POST "$AUDIT_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$payload" >/dev/null

      - name: Fail workflow on critical findings
        if: ${{ steps.parse.outputs.critical != '0' }}
        run: |
          echo "Falhas críticas encontradas na auditoria diária."
          exit 1
